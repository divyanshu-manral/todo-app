<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <img class="app-logo" src="checked.png" alt="logo">
        <h2 class="app-heading">ToDo App</h2>
    </div>

    <div class="input-section">
        <input class="input" type="text" placeholder="Add a new task...">
        <button class="add-btn">Add</button>
    </div>

    <div class="task-list"></div>

    <div class="footer">
        <p class="task-count">0 Tasks</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
